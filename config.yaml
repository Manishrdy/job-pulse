target_roles:
  - "AI Engineer"
  - "Gen AI Engineer"
  - "Generative AI Engineer"
  - "Forward Deployed Engineer"
  - "Software Engineer"
  - "Senior Software Engineer"
  - "Software Development Engineer"
  - "Backend Engineer"

ats_platforms:
  primary:
    - greenhouse
    - lever
    - ashby
    - icims
  secondary:
    - smartrecruiters
    - jazzhr
    - teamtailor
    - gem
    - bamboohr
    - workable
    - rippling
    - phenom
  low_priority:
    - workday

schedule:
  scrape_times:        # one daily scrape; add more HH:MM entries for more runs/day
    - "05:00"
  cleanup_time: "02:00"
  timezone: "America/New_York"   # 5 AM Eastern

location:
  primary: "United States"
  country_code: "US"        # roster-matched country: "US" or "IN" (India)
  remote_preferred: true
  keep_unknown: false       # strict: drop jobs whose country can't be confirmed (unless remote)

cron:
  enabled: false   # in-process scheduler; override with JOBPULSE_CRON_ENABLED env

scrape:
  max_companies_per_ats: null   # no cap — scrape ALL companies per ATS (hours; for the 5 AM cron)
  per_ats_overrides: {}         # e.g. {workday: 5} to cap a slow ATS; empty = uncapped everywhere
  concurrency: 20               # global thread budget across ALL ATS (they run in parallel; distributed by company count)
  default_ats_concurrency: 8    # per-ATS concurrency ceiling default
  per_ats_concurrency:          # per-ATS ceilings for hosts that rate-limit hard
    workable: 2                 # workable spawns 4 internal threads/company → 2×4=8 in-flight (avoids 429)
    workday: 2                  # heavy enterprise tenants
    smartrecruiters: 4
  skip_unproductive: true       # skip companies proven to never post in the target region (big time saver)
  skip_after_runs: 3            # consecutive reachable-but-foreign runs before a company is skipped
  recheck_days: 30              # re-probe skipped companies this often so new in-region hiring is caught

google_search:                  # Phase 2 Google-search discovery channel ("Search Internet" button)
  engine: "browser"             # "browser" = real Chrome via nodriver (beats rate-limiting); "http" = legacy plain-httpx (gets /sorry/+429)
  headless: false               # run Chrome visibly (headless is more detectable)
  settle_seconds: 3.0           # wait for results to render before scraping
  user_data_dir: "~/.jobpulse/chrome-profile"  # persistent Chrome profile — solve a CAPTCHA / sign in ONCE and trust sticks; "" = throwaway profile each run
  max_queries_per_run: 40       # polite batch/run; self-stops at the cap (records a 'partial' run). Raise to cover more per run (higher block risk)
  min_delay: 20.0               # randomized inter-query delay (seconds) — generous to avoid rate limits
  max_delay: 45.0
  max_consecutive_failures: 5   # abort a run after this many failures in a row
  cache_ttl_hours: 24           # skip re-fetching the same (query, url) within this window

data_lifecycle:
  ttl_days: 3

database:
  path: "jobpulse.db"

logging:
  level: "INFO"
  file: "logs/jobpulse.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

server:
  host: "0.0.0.0"
  port: 8000

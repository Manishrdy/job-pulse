target_roles:
  - "AI Engineer"
  - "Gen AI Engineer"
  - "Generative AI Engineer"
  - "Forward Deployed Engineer"
  - "Software Engineer"
  - "Senior Software Engineer"
  - "Software Development Engineer"
  - "Backend Engineer"

ats_platforms:
  primary:
    - greenhouse
    - lever
    - ashby
    - icims
  secondary:
    - smartrecruiters
    - jazzhr
    - teamtailor
    - gem
    - bamboohr
    - workable
    - rippling
    - phenom
  low_priority:
    - workday

schedule:
  scrape_times:        # one daily scrape; add more HH:MM entries for more runs/day
    - "05:00"
  cleanup_time: "02:00"
  timezone: "America/New_York"   # 5 AM Eastern

location:
  primary: "United States"
  country_code: "US"        # roster-matched country: "US" or "IN" (India)
  remote_preferred: true
  keep_unknown: false       # strict: drop jobs whose country can't be confirmed (unless remote)

cron:
  enabled: false   # in-process scheduler; override with JOBPULSE_CRON_ENABLED env

scrape:
  max_companies_per_ats: null   # no cap — scrape ALL companies per ATS (hours; for the 5 AM cron)
  per_ats_overrides: {}         # e.g. {workday: 5} to cap a slow ATS; empty = uncapped everywhere
  concurrency: 8                # concurrent company fetches per ATS (raise for speed, lower for politeness)

data_lifecycle:
  ttl_days: 3

database:
  path: "jobpulse.db"

logging:
  level: "INFO"
  file: "logs/jobpulse.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

server:
  host: "0.0.0.0"
  port: 8000

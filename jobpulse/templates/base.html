<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JobPulse{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <script src="https://unpkg.com/htmx.org@2.0.3" crossorigin="anonymous"></script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">⚡ JobPulse</a>
    <nav class="nav">
      <a href="/">Feed</a>
      <a href="/applied">Applied</a>
      <a href="/analytics">Analytics</a>
      <a href="/blocklist">Blocklist</a>
      <a href="/scrape-logs">Scrape Logs</a>
    </nav>
  </header>

  <main class="content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
